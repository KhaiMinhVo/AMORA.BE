name: Deploy to Google Cloud

on:
  workflow_dispatch:
  push:
    branches:
      - main # Khi có code mới đẩy lên nhánh main sẽ tự động chạy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        command_timeout: 30m
        script: |
          set -euo pipefail

          # Di chuyển vào thư mục code
          git -C ~/amora-audio-worker fetch origin master
          git -C ~/amora-audio-worker reset --hard origin/master
          git -C ~/amora-audio-worker clean -fd

          cd ~/AMORA.BE
          
          # Kéo code mới nhất từ nhánh main (Xóa đè các file bị sửa trên server nếu có)
          git fetch origin main
          git reset --hard origin/main
          git clean -fd
          
          # Build tuần tự để giảm đỉnh sử dụng RAM/ổ đĩa trên VPS nhỏ.
          docker compose build amora-api
          docker compose build ai-service
          docker compose build audio-worker
          docker compose build chat-voice-consumer

          docker compose up -d --no-build --remove-orphans

          # Chỉ báo deploy thành công khi API thực sự sẵn sàng.
          attempt=1
          until curl -fsS http://localhost:5002/health > /dev/null; do
            if [ "$attempt" -ge 36 ]; then
              docker compose ps
              docker compose logs --tail=100 amora-api || true
              exit 1
            fi

            attempt=$((attempt + 1))
            sleep 5
          done

          # Bắt trường hợp worker/service vừa khởi động rồi crash hoặc restart.
          sleep 10
          for service in amora-api ai-service audio-worker chat-voice-consumer seq; do
            container_id="$(docker compose ps -q "$service")"
            if [ -z "$container_id" ] || [ "$(docker inspect --format '{{.State.Status}}' "$container_id")" != "running" ]; then
              docker compose logs --tail=100 "$service" || true
              exit 1
            fi
          done

          docker compose ps
          docker image prune -f

          # Cập nhật cấu hình Nginx và reload (nếu user không bị hỏi pass khi dùng sudo)
          # Nếu chạy CI bị lỗi ở bước này (do đòi mật khẩu), bạn xóa 2 dòng dưới đi 
          # và tự chạy tay trên server 1 lần duy nhất nhé!
          sudo cp ~/AMORA.BE/nginx.conf /etc/nginx/sites-available/default || true
          sudo systemctl reload nginx || true
