version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: amora-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: AmoraCoreDb
    ports:
      - "5444:5432"
    volumes:
      - postgres_data2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6.0
    container_name: amora-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: amora-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: amora-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: amora-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  seq:
    image: datalust/seq:latest
    container_name: amora-seq
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:5341"    # Ingestion + UI
      - "8081:80"      # Alternate UI port
    volumes:
      - seq_data:/data

  audio-worker:
    build:
      context: ../amora-audio-worker
      dockerfile: Dockerfile
    container_name: amora-audio-worker
    env_file:
      - ../amora-audio-worker/.env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      DOTNET_WEBHOOK_URL: http://host.docker.internal:5002/api/webhooks/audio-processed
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 1

  amora-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amora-api
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=AmoraCoreDb;Username=postgres;Password=postgres
      ConnectionStrings__MongoDb: mongodb://mongodb:27017
      ConnectionStrings__Redis: redis:6379
      RabbitMQ__Url: amqp://guest:guest@rabbitmq:5672//
      AWS__ServiceURL: "http://minio:9000"
      AWS__ForcePathStyle: "true"
      AWS__AccessKey: "minioadmin"
      AWS__SecretKey: "minioadmin"
      Storage__BucketName: "amora-voice-bucket"
      Storage__PublicBaseUrl: "http://localhost:9000/amora-voice-bucket"
      Twilio__AccountSid: "${TWILIO_ACCOUNT_SID}"
      Twilio__AuthToken: "${TWILIO_AUTH_TOKEN}"
      Twilio__FromNumber: "${TWILIO_FROM_NUMBER}"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  chat-voice-consumer:
    build:
      context: ../amora-audio-worker
      dockerfile: Dockerfile
    container_name: amora-chat-voice-consumer
    command: python -m consumers.chat_voice_consumer
    env_file:
      - ../amora-audio-worker/.env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data2:
  mongodb_data:
  rabbitmq_data:
  minio_data:
  seq_data: