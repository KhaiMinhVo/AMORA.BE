services:
  postgres:
    image: postgres:15-alpine
    container_name: amora-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: AmoraCoreDb
    ports:
      - "5444:5432"
    volumes:
      - postgres_data2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6.0
    container_name: amora-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: amora-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: amora-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  seq:
    image: datalust/seq:latest
    container_name: amora-seq
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:5341"    # Ingestion + UI
      - "8081:80"      # Alternate UI port
    volumes:
      - seq_data:/data

  audio-worker:
    build:
      context: ../amora-audio-worker
      dockerfile: Dockerfile
    container_name: amora-audio-worker
    env_file:
      - ../amora-audio-worker/.env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      DOTNET_WEBHOOK_URL: http://amora-api:8080/api/webhooks/audio-processed
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 1

  ai-service:
    build:
      context: ./src/Amora.AiService
      dockerfile: Dockerfile
    container_name: amora-ai-service
    environment:
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY}
      AI_ALLOWED_AUDIO_HOSTS: ${AI_ALLOWED_AUDIO_HOSTS:-amora-voice-bucket.s3.amazonaws.com,cdn.amora.pro.vn}
      AI_BIND_HOST: 0.0.0.0
    restart: unless-stopped

  amora-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amora-api
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=AmoraCoreDb;Username=postgres;Password=${POSTGRES_PASSWORD}
      ConnectionStrings__MongoDb: mongodb://mongodb:27017
      ConnectionStrings__Redis: redis:6379
      RabbitMQ__Url: amqp://guest:guest@rabbitmq:5672//
      AiService__Url: http://ai-service:8000
      AiService__ApiKey: ${AI_SERVICE_API_KEY}
      AWS__AccessKey: ${AWS_ACCESS_KEY_ID}
      AWS__SecretKey: ${AWS_SECRET_ACCESS_KEY}
      EmailSettings__Username: ${SMTP_USERNAME}
      EmailSettings__Password: ${SMTP_PASSWORD}
      EmailSettings__FromEmail: ${SMTP_FROM}
      Webhooks__Secret: ${WEBHOOK_SECRET}
      Jwt__Key: ${JWT_KEY}
      Gemini__ApiKey: ${GEMINI_API_KEY}
      PayOS__ClientId: ${PAYOS_CLIENT_ID}
      PayOS__ApiKey: ${PAYOS_API_KEY}
      PayOS__ChecksumKey: ${PAYOS_CHECKSUM_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      ai-service:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  chat-voice-consumer:
    build:
      context: ../amora-audio-worker
      dockerfile: Dockerfile
    container_name: amora-chat-voice-consumer
    command: python -m consumers.chat_voice_consumer
    env_file:
      - ../amora-audio-worker/.env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      ALLOWED_AUDIO_HOSTS: ${ALLOWED_AUDIO_HOSTS:-amora-voice-bucket.s3.amazonaws.com,cdn.amora.pro.vn}
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data2:
  mongodb_data:
  rabbitmq_data:
  seq_data:
