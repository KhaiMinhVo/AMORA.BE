version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: amora-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: AmoraCoreDb
    ports:
      - "5444:5432"
    volumes:
      - postgres_data2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6.0
    container_name: amora-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: amora-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  audio-worker:
    build:
      context: ../amora-audio-worker
      dockerfile: Dockerfile
    container_name: amora-audio-worker
    env_file:
      - ../amora-audio-worker/.env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      DOTNET_WEBHOOK_URL: http://host.docker.internal:5002/api/webhooks/audio-processed
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 1

  chat-voice-consumer:
    build:
      context: ../amora-audio-worker
      dockerfile: Dockerfile
    container_name: amora-chat-voice-consumer
    command: python -m consumers.chat_voice_consumer
    env_file:
      - ../amora-audio-worker/.env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data2:
  mongodb_data:
  rabbitmq_data: