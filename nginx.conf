# Lưu ý: File này dùng làm mẫu (Template) lưu trữ trong source code.
# Nếu bạn muốn cấu hình chạy thật, bạn cần copy nội dung file này
# hoặc copy trực tiếp file này đè vào /etc/nginx/sites-available/default trên server.

server {
    # Nếu bạn chưa có chứng chỉ SSL (HTTPS), cứ để cổng 80
    listen 80;
    
    # Thay bằng domain thật của bạn (ví dụ: api.amora.com), hoặc để '_'
    server_name dating.amora.pro.vn; 

    location / {
        # Port 5002 là port mà container amora-api đang public ra máy host
        proxy_pass http://127.0.0.1:5002;
        
        # --- QUAN TRỌNG ĐỂ SIGNALR WEBSOCKET HOẠT ĐỘNG ---
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        # -------------------------------------------------

        # Các header khác giúp BE nhận đúng IP của Client
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # --- TRÁNH TIMEOUT CHO LONG POLLING & WEBSOCKET ---
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
        proxy_cache off;
    }
}
